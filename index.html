<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazon Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-logo">
    <div class="logo"></div>
  </div>

  <div class="nav-address">
    <p class="add-first">Deliver to</p>
    <p class="add-second">India</p>
  </div>

  <div class="nav-search">
    <select class="search-select">
      <option>All</option>
    </select>
    <input placeholder="Search Amazon" class="search-input">
    <div class="search-icon">🔍</div>
  </div>

  <div class="nav-signin">
    <p>Hello, sign in</p>
    <p class="bold">Account & Lists</p>
  </div>

  <div class="nav-orders">
    <p>Returns</p>
    <p class="bold">& Orders</p>
  </div>

  <div class="nav-cart">
    🛒 Cart
  </div>
</div>

<div class="panel">
  <div>☰ All</div>
  <div class="panel-ops">
    <p>Today's Deals</p>
    <p>Customer Service</p>
    <p>Registry</p>
    <p>Gift Cards</p>
    <p>Sell</p>
  </div>
</div>

<div class="hero-section">
  <div class="hero-msg">
    Find gifts for dads who have it all
  </div>
</div>

</body>
</html>
